<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>URBANAXIS | Business Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #07070f;
  --surface: #0f0f1e;
  --surface2: #171728;
  --surface3: #1e1e32;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --gold-dim: rgba(201,168,76,0.12);
  --text: #f0eff8;
  --text2: #a0a0b8;
  --text3: #6060780;
  --danger: #e05555;
  --success: #44cc88;
  --info: #5599ff;
  --shadow: 0 24px 60px rgba(0,0,0,0.6);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-lg: 24px;
  --nav-h: 70px;
  --transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }

/* ── BG Orbs ── */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80vw 60vh at 10% 10%, rgba(201,168,76,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60vw 60vh at 90% 80%, rgba(85,50,180,0.08) 0%, transparent 60%),
    var(--bg);
}

#app { position: relative; z-index: 1; min-height: 100vh; }

/* ─────────────────── TYPOGRAPHY ─────────────────── */
.serif { font-family: 'DM Serif Display', serif; }
.display {
  font-family: 'DM Serif Display', serif;
  letter-spacing: -0.02em;
}

/* ─────────────────── LAYOUT ─────────────────── */
.page { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }
.page-sm { max-width: 700px; margin: 0 auto; padding: 28px 20px 60px; }

/* ─────────────────── NAV ─────────────────── */
#nav-bar {
  position: sticky; top: 0; z-index: 100;
  height: var(--nav-h);
  display: flex; align-items: center;
  padding: 0 24px;
  background: rgba(7,7,15,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.nav-logo {
  display: flex; align-items: center; gap: 10px;
  font-family: 'DM Serif Display', serif;
  font-size: 1.5rem;
  letter-spacing: 0.04em;
  color: var(--text);
  flex-shrink: 0;
}

.nav-logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem; color: #000;
}

.nav-links { display: flex; gap: 4px; flex: 1; justify-content: center; flex-wrap: wrap; }

.nav-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 14px; border-radius: 40px;
  background: transparent; border: none;
  color: var(--text2); font-family: 'Outfit', sans-serif;
  font-size: 0.88rem; font-weight: 500;
  cursor: pointer; transition: var(--transition);
  white-space: nowrap;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); }
.nav-btn i { font-size: 0.85rem; }

.nav-user {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}

.nav-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dim), var(--surface3));
  border: 1px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
}

.btn-logout {
  padding: 7px 14px; border-radius: 40px;
  background: rgba(224,85,85,0.1); border: 1px solid rgba(224,85,85,0.25);
  color: var(--danger); font-family: 'Outfit', sans-serif;
  font-size: 0.85rem; font-weight: 500;
  cursor: pointer; transition: var(--transition);
}
.btn-logout:hover { background: rgba(224,85,85,0.2); }

/* ─────────────────── BUTTONS ─────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px; border-radius: 40px;
  border: none; cursor: pointer;
  font-family: 'Outfit', sans-serif; font-weight: 600;
  font-size: 0.9rem; transition: var(--transition);
  text-decoration: none; white-space: nowrap;
}
.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #000; box-shadow: 0 4px 20px rgba(201,168,76,0.3);
}
.btn-gold:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(201,168,76,0.4); }

.btn-outline {
  background: transparent; color: var(--text);
  border: 1px solid var(--border2);
}
.btn-outline:hover { background: var(--surface2); border-color: var(--gold); color: var(--gold); }

.btn-ghost {
  background: var(--surface2); color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface3); color: var(--text); }

.btn-danger {
  background: rgba(224,85,85,0.15); color: var(--danger);
  border: 1px solid rgba(224,85,85,0.3);
}
.btn-danger:hover { background: rgba(224,85,85,0.25); }

.btn-sm { padding: 6px 14px; font-size: 0.8rem; }
.btn-lg { padding: 14px 32px; font-size: 1rem; }
.btn-full { width: 100%; justify-content: center; border-radius: var(--radius-sm); }

/* ─────────────────── CARDS ─────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.card-body { padding: 24px; }
.card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
.card-footer { padding: 16px 24px; border-top: 1px solid var(--border); }

.glass {
  background: rgba(15,15,30,0.7);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border2);
}

/* ─────────────────── STATS ─────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 16px; margin-bottom: 28px; }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative; overflow: hidden;
  transition: var(--transition);
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
  background: linear-gradient(to bottom, var(--gold), transparent);
}
.stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.stat-icon { font-size: 1.4rem; color: var(--gold); margin-bottom: 10px; }
.stat-val { font-size: 2rem; font-weight: 800; color: var(--text); line-height: 1; }
.stat-label { font-size: 0.78rem; color: var(--text2); margin-top: 4px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }

/* ─────────────────── FORMS ─────────────────── */
.field { position: relative; margin-bottom: 16px; }

.field-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: var(--text2); font-size: 0.85rem; pointer-events: none;
  transition: var(--transition);
}

.field input, .field select, .field textarea {
  width: 100%; padding: 13px 16px 13px 44px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 0.92rem;
  outline: none; transition: var(--transition);
}
.field input::placeholder, .field textarea::placeholder { color: var(--text2); opacity: 0.6; }
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--gold);
  background: var(--surface3);
  box-shadow: 0 0 0 3px var(--gold-dim);
}
.field input:focus ~ .field-icon,
.field:focus-within .field-icon { color: var(--gold); }

.field-label {
  display: block; margin-bottom: 6px;
  font-size: 0.82rem; font-weight: 600;
  color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase;
}

.field-no-icon input, .field-no-icon select {
  padding-left: 16px;
}

/* ─────────────────── AUTH PAGE ─────────────────── */
#auth-page {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}

.auth-wrap {
  width: 100%; max-width: 960px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  border-radius: var(--radius-lg);
  overflow: hidden; box-shadow: var(--shadow);
  border: 1px solid var(--border2);
}

.auth-left {
  background: linear-gradient(145deg, #0b0b1a 0%, #111130 100%);
  padding: 50px 40px;
  display: flex; flex-direction: column; justify-content: center;
  position: relative; overflow: hidden;
}
.auth-left::before {
  content: 'URBANAXIS';
  font-family: 'DM Serif Display', serif;
  position: absolute; font-size: 8rem; opacity: 0.03;
  right: -20px; bottom: 20px; white-space: nowrap;
  letter-spacing: -0.02em; color: var(--gold);
}

.auth-brand-icon {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; color: #000; margin-bottom: 28px;
  box-shadow: 0 8px 24px rgba(201,168,76,0.35);
}

.auth-title {
  font-family: 'DM Serif Display', serif;
  font-size: 3.2rem; line-height: 1.05;
  color: var(--text); margin-bottom: 16px;
}
.auth-title span { color: var(--gold); }

.auth-desc {
  color: var(--text2); font-size: 0.95rem; line-height: 1.6; margin-bottom: 36px;
}

.auth-features { display: flex; flex-direction: column; gap: 14px; }
.auth-feature {
  display: flex; align-items: center; gap: 12px;
  font-size: 0.88rem; color: var(--text2);
}
.auth-feature i { color: var(--gold); width: 16px; }

.auth-right {
  background: var(--surface);
  padding: 50px 40px;
}

.auth-logo {
  text-align: center;
  margin-bottom: 24px;
}
.auth-logo-main {
  font-family: 'DM Serif Display', serif;
  font-size: 2.8rem;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 0.04em;
  line-height: 1;
}
.auth-logo-sub {
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  color: var(--text2);
  text-transform: uppercase;
  margin-top: 4px;
}

.auth-tabs {
  display: flex; background: var(--surface2);
  border-radius: 40px; padding: 4px; margin-bottom: 30px;
}
.auth-tab {
  flex: 1; padding: 10px; border-radius: 40px;
  border: none; background: transparent;
  color: var(--text2); font-family: 'Outfit', sans-serif;
  font-weight: 600; font-size: 0.9rem;
  cursor: pointer; transition: var(--transition);
}
.auth-tab.active { background: var(--gold); color: #000; }

.auth-heading { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
.auth-sub { color: var(--text2); font-size: 0.88rem; margin-bottom: 26px; }

/* ─────────────────── BADGE ─────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 40px;
  font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em;
}
.badge-gold { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); }
.badge-blue { background: rgba(85,153,255,0.1); color: var(--info); border: 1px solid rgba(85,153,255,0.2); }
.badge-green { background: rgba(68,204,136,0.1); color: var(--success); border: 1px solid rgba(68,204,136,0.2); }
.badge-red { background: rgba(224,85,85,0.1); color: var(--danger); border: 1px solid rgba(224,85,85,0.2); }
.badge-purple { background: rgba(150,100,240,0.1); color: #b08cff; border: 1px solid rgba(150,100,240,0.2); }

/* ─────────────────── USER CARDS ─────────────────── */
.user-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  transition: var(--transition);
}
.user-card:hover { border-color: var(--border2); transform: translateY(-2px); }

.user-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dim), var(--surface3));
  border: 1px solid rgba(201,168,76,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
}

/* ─────────────────── PRODUCT CARDS ─────────────────── */
.product-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px;
  transition: var(--transition); display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
.product-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
  transform: scaleX(0); transition: var(--transition);
}
.product-card:hover { border-color: rgba(201,168,76,0.25); transform: translateY(-4px); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
.product-card:hover::after { transform: scaleX(1); }

.product-icon-wrap {
  width: 52px; height: 52px; border-radius: 14px;
  background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; color: var(--gold); margin-bottom: 16px;
}
.product-name { font-weight: 700; font-size: 1.05rem; margin-bottom: 6px; }
.product-desc { color: var(--text2); font-size: 0.87rem; line-height: 1.55; flex: 1; }
.product-price { font-size: 1.6rem; font-weight: 800; color: var(--text); margin: 16px 0 0; }
.product-price span { font-size: 0.78rem; color: var(--text2); font-weight: 400; }

/* ─────────────────── CHAT ─────────────────── */
.chat-wrap { display: grid; grid-template-columns: 280px 1fr; gap: 16px; height: calc(100vh - var(--nav-h) - 100px); min-height: 500px; }

.chat-sidebar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column;
}

.chat-sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); font-weight: 600; }

.chat-list { flex: 1; overflow-y: auto; padding: 8px; }

.chat-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; border-radius: var(--radius-sm);
  cursor: pointer; transition: var(--transition);
}
.chat-item:hover { background: var(--surface2); }
.chat-item.active { background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2); }
.chat-item-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
.chat-item-name { font-size: 0.9rem; font-weight: 600; }
.chat-item-last { font-size: 0.76rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-unread {
  background: var(--gold); color: #000; border-radius: 40px;
  padding: 1px 8px; font-size: 0.7rem; font-weight: 700; margin-left: auto; flex-shrink: 0;
}

.chat-main {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden;
}
.chat-main-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

.msg-row { display: flex; gap: 8px; }
.msg-row.me { flex-direction: row-reverse; }

.msg-bubble {
  max-width: 65%; padding: 10px 14px; border-radius: 18px;
  font-size: 0.88rem; line-height: 1.5; word-break: break-word;
}
.msg-bubble.me { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #000; border-bottom-right-radius: 4px; }
.msg-bubble.other { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-bottom-left-radius: 4px; }
.msg-time { font-size: 0.7rem; color: var(--text2); margin-top: 4px; text-align: right; }

.chat-input-bar { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
.chat-input-bar input {
  flex: 1; padding: 11px 16px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 40px; color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 0.9rem; outline: none;
  transition: var(--transition);
}
.chat-input-bar input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }

/* ─────────────────── SECTION HEADER ─────────────────── */
.section-hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px; gap: 12px; flex-wrap: wrap;
}
.section-title { font-weight: 700; font-size: 1.25rem; display: flex; align-items: center; gap: 10px; }
.section-title span { color: var(--gold); }

/* ─────────────────── HERO BANNER ─────────────────── */
.hero-banner {
  border-radius: var(--radius-lg); overflow: hidden;
  position: relative; margin-bottom: 28px; height: 220px;
  background: url('https://images.pexels.com/photos/3182812/pexels-photo-3182812.jpeg?auto=compress&cs=tinysrgb&w=1400') center/cover no-repeat;
}
.hero-banner::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(7,7,15,0.9) 0%, rgba(7,7,15,0.5) 60%, transparent 100%);
}
.hero-content { position: relative; z-index: 1; padding: 36px 40px; display: flex; flex-direction: column; justify-content: center; height: 100%; }
.hero-tag { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.hero-heading { font-family: 'DM Serif Display', serif; font-size: 2.4rem; line-height: 1.1; margin-bottom: 12px; }
.hero-sub { font-size: 0.92rem; color: rgba(255,255,255,0.7); max-width: 360px; }

/* ─────────────────── STORE HERO ─────────────────── */
.store-hero {
  border-radius: var(--radius-lg); overflow: hidden;
  position: relative; margin-bottom: 32px; height: 240px;
  background: url('https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg?auto=compress&cs=tinysrgb&w=1400') center/cover no-repeat;
}
.store-hero::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(7,7,15,0.88) 0%, rgba(7,7,15,0.5) 100%);
}

/* ─────────────────── TASK ─────────────────── */
.task-row {
  display: flex; align-items: center; gap: 12px; padding: 14px 18px;
  border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border);
  margin-bottom: 10px; transition: var(--transition);
}
.task-row:hover { border-color: var(--border2); }
.task-row select {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); padding: 5px 10px; border-radius: 40px;
  font-family: 'Outfit', sans-serif; font-size: 0.8rem; outline: none;
  cursor: pointer;
}

/* ─────────────────── PROFILE ─────────────────── */
.profile-avatar {
  width: 88px; height: 88px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dim), var(--surface3));
  border: 2px solid rgba(201,168,76,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.8rem; margin: 0 auto 16px;
}

/* ─────────────────── MODAL ─────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center; padding: 20px;
  animation: fadeIn 0.18s ease;
}
.modal-box {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 480px;
  box-shadow: var(--shadow);
  animation: slideUp 0.22s cubic-bezier(0.4,0,0.2,1);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ─────────────────── TOAST ─────────────────── */
#toast-container { position: fixed; bottom: 28px; right: 28px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
.toast {
  padding: 12px 18px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text); font-size: 0.87rem; box-shadow: var(--shadow);
  animation: toastIn 0.22s ease; max-width: 320px;
  display: flex; align-items: center; gap: 10px;
}
.toast.success { border-color: rgba(68,204,136,0.3); }
.toast.error { border-color: rgba(224,85,85,0.3); }
@keyframes toastIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(40px); opacity: 0; } }

/* ─────────────────── AUTH TABS (chat type) ─────────────────── */
.tab-bar { display: flex; gap: 4px; background: var(--surface2); border-radius: 40px; padding: 4px; margin-bottom: 20px; width: fit-content; }
.tab-btn {
  padding: 8px 20px; border-radius: 40px; border: none;
  background: transparent; color: var(--text2);
  font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 500;
  cursor: pointer; transition: var(--transition);
}
.tab-btn.active { background: var(--gold); color: #000; font-weight: 600; }

/* ─────────────────── ADMIN STAGE BUTTONS ─────────────────── */
.stage-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
.stage-btn {
  padding: 4px 12px; border-radius: 40px; border: 1px solid var(--border2);
  background: transparent; color: var(--text2);
  font-family: 'Outfit', sans-serif; font-size: 0.75rem; font-weight: 500;
  cursor: pointer; transition: var(--transition);
}
.stage-btn:hover { border-color: var(--gold); color: var(--gold); }
.stage-btn.sel { background: var(--gold-dim); color: var(--gold); border-color: rgba(201,168,76,0.3); }

/* ─────────────────── STORE ADMIN FORM ─────────────────── */
.admin-form-bar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }

/* ─────────────────── DIVIDER ─────────────────── */
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* ─────────────────── PRODUCT GRID ─────────────────── */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 20px; }

/* ─────────────────── RESPONSIVE ─────────────────── */
@media (max-width: 768px) {
  .auth-wrap { grid-template-columns: 1fr; }
  .auth-left { display: none; }
  .auth-right { padding: 36px 24px; }
  .auth-title { font-size: 2.2rem; }
  .nav-links { gap: 2px; }
  .nav-btn { padding: 7px 10px; font-size: 0.8rem; }
  .chat-wrap { grid-template-columns: 1fr; height: auto; }
  .chat-sidebar { max-height: 260px; }
  .chat-messages { min-height: 300px; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .hero-heading { font-size: 1.8rem; }
  .hero-banner, .store-hero { height: 180px; }
  .hero-content { padding: 24px 20px; }
}

/* ─────────────────── ANIMATIONS ─────────────────── */
.fade-in { animation: fadeIn 0.3s ease; }
.slide-up { animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1); }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner { animation: spin 0.8s linear infinite; display: inline-block; }

/* ─────────────────── SCROLLABLE REGION ─────────────────── */
.scroll-region { overflow-y: auto; max-height: 420px; }

/* ─────────────────── LIVE DOT ─────────────────── */
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--success); display: inline-block;
  animation: livePulse 1.5s ease infinite;
}
@keyframes livePulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.8); } }
</style>
</head>

<script>
// ═══════════════════════════════════════════════════
//  DATABASE LAYER  (localStorage as persistent store)
// ═══════════════════════════════════════════════════

const DB = {

      { id:'admin2', name:'Shivraj Singh', email:'shivraj@gmail.com', password:btoa('urbanaxisceoshiv'), role:'admin', avatar:'👨‍💼', phone:'+91 87654 32109', location:'Delhi, India', stage:null, createdAt:new Date().toISOString() }
    ];

      { id:'demo2', name:'Mike Chen', email:'mike@urbanaxis.com', password:btoa('mike123'), role:'user', avatar:'👨‍💼', phone:'+1 555 987 6543', location:'San Francisco, USA', stage:'working', createdAt:new Date().toISOString() }
    ];
    const users = this.get('users');
    demos.forEach(d => { if (!users.find(u => u.email === d.email)) users.push(d); });
    this.set('users', users);
  },
  _seedProducts() {
    const p = this.get('products');
    if (p.length === 0) {
      const seeds = [
        { id:'p1', name:'URBANAXIS Business Suite', description:'Complete digital transformation toolkit with AI analytics, CRM integration and smart dashboards.', price:'$299/mo', iconClass:'fas fa-chart-line', active:true },
        { id:'p2', name:'Elite Consulting Package', description:'1-on-1 strategy sessions with senior architects — business roadmap, design sprints included.', price:'$1,499', iconClass:'fas fa-handshake', active:true },
        { id:'p3', name:'WebApp Blueprint Pro', description:'Fully responsive web application template with 3 months priority support.', price:'$899', iconClass:'fas fa-code', active:true },
        { id:'p4', name:'24/7 Priority Support', description:'Dedicated support channel, SLA guaranteed with sub-1hr response time.', price:'$149/mo', iconClass:'fas fa-headset', active:true },
        { id:'p5', name:'Brand Identity Kit', description:'Logo, color palette, typography system and brand guidelines crafted by our design experts.', price:'$599', iconClass:'fas fa-palette', active:true },
        { id:'p6', name:'SEO & Growth Pack', description:'On-page SEO audit, backlink strategy, and monthly growth analytics report.', price:'$249/mo', iconClass:'fas fa-rocket', active:true }

      this.set('products', seeds);

};

// ─── User helpers ───
function getUsers() { return DB.get('users') || []; }
function saveUsers(u) { DB.set('users', u); }
function findUser(email) { return getUsers().find(u => u.email === email); }
function getClients() { return getUsers().filter(u => u.role === 'user'); }
function getAdmins() { return getUsers().filter(u => u.role === 'admin'); }

function createUser(name, email, phone, password) {
  if (findUser(email)) throw new Error('An account with this email already exists.');
  const users = getUsers();
  const user = { id: 'u' + Date.now(), name, email, phone, password: btoa(password), role: 'user', avatar: '👤', location: '', stage: 'interested', createdAt: new Date().toISOString() };
  users.push(user); saveUsers(users);
  return user;
}

function authenticate(email, password) {
  const user = findUser(email);
  if (!user) throw new Error('No account found with that email.');
  if (btoa(password) !== user.password) throw new Error('Incorrect password.');
  return { ...user };
}

function updateUser(email, updates) {
  const users = getUsers();
  const idx = users.findIndex(u => u.email === email);
  if (idx !== -1) { Object.assign(users[idx], updates); saveUsers(users); }
}

// ─── Messages ───
function getMessages() { return DB.get('messages') || []; }
function saveMessages(m) { DB.set('messages', m); }

function sendMsg(fromEmail, toEmail, text) {
  if (!text?.trim()) return null;
  const msgs = getMessages();
  const msg = { id: 'm' + Date.now() + Math.random(), from: fromEmail, to: toEmail, text: text.trim(), ts: new Date().toISOString(), read: false };
  msgs.push(msg); saveMessages(msgs); return msg;
}

function getConversation(a, b) {
  return getMessages().filter(m => (m.from===a && m.to===b) || (m.from===b && m.to===a)).sort((x,y) => new Date(x.ts) - new Date(y.ts));
}

function unreadCount(myEmail, otherEmail) {
  return getMessages().filter(m => m.to===myEmail && m.from===otherEmail && !m.read).length;
}

function markRead(myEmail, otherEmail) {
  const msgs = getMessages();
  let changed = false;
  msgs.forEach(m => { if (m.to===myEmail && m.from===otherEmail && !m.read) { m.read=true; changed=true; } });
  if (changed) saveMessages(msgs);
}

// ─── Tasks ───
function getTasks() { return DB.get('tasks') || []; }
function saveTasks(t) { DB.set('tasks', t); }

function createTask(assignedTo, title, dueDate, status='pending') {
  const tasks = getTasks();
  tasks.push({ id: 't'+Date.now(), assignedTo, title, dueDate: dueDate||'', status, createdAt: new Date().toISOString() });
  saveTasks(tasks);
}

function updateTask(id, updates) {
  const tasks = getTasks();
  const idx = tasks.findIndex(t => t.id===id);
  if (idx!==-1) { Object.assign(tasks[idx], updates); saveTasks(tasks); }
}

function deleteTask(id) { saveTasks(getTasks().filter(t => t.id!==id)); }

function userTasks(email) { return getTasks().filter(t => t.assignedTo===email); }

// ─── Products ───
function getProducts() { return DB.get('products') || []; }
function saveProducts(p) { DB.set('products', p); }

function addProduct(p) {
  const products = getProducts();
  const np = { ...p, id: 'p'+Date.now(), active: true };
  products.push(np); saveProducts(products); return np;
}

function updateProduct(id, updates) {
  const products = getProducts();
  const idx = products.findIndex(p => p.id===id);
  if (idx!==-1) { Object.assign(products[idx], updates); saveProducts(products); }
}

function deleteProduct(id) { saveProducts(getProducts().filter(p => p.id!==id)); }


// ═══════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════

let currentUser = null;
let activeView = 'login';
let activeChatEmail = null;
let chatTabType = 'admin'; // 'admin' | 'users'
let chatPollTimer = null;
let assignTaskModalFor = null;

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type='success') {
  const tc = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}" style="color:${type==='success'?'var(--success)':'var(--danger)'}"></i> ${esc(msg)}`;
  tc.appendChild(el);
  setTimeout(() => { el.style.animation='toastOut 0.22s ease forwards'; setTimeout(() => el.remove(), 250); }, 3200);
}

function stageColor(s) {
  return { interested:'badge-blue', working:'badge-purple', complete:'badge-green' }[s] || 'badge-gold';
}

function tsLabel(ts) {
  const d = new Date(ts);
  const now = new Date();
  if (now - d < 86400000) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString([], {month:'short',day:'numeric'});
}


// ═══════════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════════

function render(view, param) {
  if (chatPollTimer) { clearInterval(chatPollTimer); chatPollTimer = null; }
  activeView = view;

  const app = document.getElementById('app');
  if (view === 'login') { app.innerHTML = renderAuth(); bindAuth(); return; }

  // Restore session
  if (!currentUser) {
    const stored = sessionStorage.getItem('ua_session') || localStorage.getItem('ua_session');
    if (stored) currentUser = JSON.parse(stored);
  }
  if (!currentUser) { app.innerHTML = renderAuth(); bindAuth(); return; }

  const isAdmin = currentUser.role === 'admin';
  let body = '';
  if (view === 'dash')       body = isAdmin ? renderAdminDash() : renderUserDash();
  else if (view === 'store') body = isAdmin ? renderStoreManager() : renderUserStore();
  else if (view === 'chat')  body = renderChatView();
  else if (view === 'profile') body = renderProfileView();
  else if (view === 'tasks' && isAdmin) body = renderTaskManager();
  else if (view === 'userDetail' && param) body = renderUserDetail(param);
  else body = isAdmin ? renderAdminDash() : renderUserDash();

  app.innerHTML = renderNav() + `<div class="page fade-in">${body}</div>`;
  bindGlobal();
  if (view === 'chat') bindChat();
  if (view === 'dash') bindDash();
  if (view === 'store' && isAdmin) bindStoreManager();
  if (view === 'store' && !isAdmin) bindUserStore();
  if (view === 'profile') bindProfile();
  if (view === 'tasks') bindTaskManager();
  if (view === 'userDetail') bindUserDetail(param);
}


// ═══════════════════════════════════════════════════
//  NAV
// ═══════════════════════════════════════════════════

function renderNav() {
  if (!currentUser) return '';
  const isAdmin = currentUser.role === 'admin';
  const links = isAdmin
    ? [['dash','fa-chart-line','Dashboard'],['tasks','fa-clipboard-list','Tasks'],['store','fa-store','Store'],['chat','fa-comments','Live Chat'],['profile','fa-user','Profile']]
    : [['dash','fa-home','Home'],['store','fa-bag-shopping','Products'],['chat','fa-comments','Live Chat'],['profile','fa-user','Profile']];

  return `

    <div class="nav-logo">
      <div class="nav-logo-icon"><i class="fas fa-chart-line"></i></div>
      URBANAXIS
    </div>
    <div class="nav-links">
      ${links.map(([v,ic,lb]) => `<button class="nav-btn ${activeView===v?'active':''}" data-nav="${v}"><i class="fas ${ic}"></i> ${lb}</button>`).join('')}

    <div class="nav-user">
      <div class="nav-avatar">${currentUser.avatar||'👤'}</div>
      <span style="font-size:0.85rem;color:var(--text2);display:none;font-weight:500" id="nav-name">${esc(currentUser.name.split(' ')[0])}</span>
      <button class="btn-logout" id="btn-logout"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </div>
  </nav>`;
}


// ═══════════════════════════════════════════════════
//  AUTH (with prominent URBANAXIS logo, demo hint removed)
// ═══════════════════════════════════════════════════

function renderAuth() {
  return `
  <div id="auth-page">

          <div class="auth-feature"><i class="fas fa-chart-bar"></i> Real-time analytics & dashboards</div>
          <div class="auth-feature"><i class="fas fa-shield-halved"></i> Secure, persistent data storage</div>

      </div>
      <div class="auth-right">

          <div class="auth-logo-main">URBANAXIS</div>
          <div class="auth-logo-sub">Business Platform</div>
        </div>

          <button class="auth-tab active" id="tab-signin">Sign In</button>
          <button class="auth-tab" id="tab-signup">Create Account</button>
        </div>

          <h2 class="auth-heading">Welcome back</h2>
          <p class="auth-sub">Sign in to your URBANAXIS account</p>
          <div class="field"><i class="field-icon fas fa-envelope"></i><input type="email" id="li-email" placeholder="Email address" autocomplete="email"></div>
          <div class="field"><i class="field-icon fas fa-lock"></i><input type="password" id="li-pass" placeholder="Password" autocomplete="current-password"></div>
          <button class="btn btn-gold btn-full" id="btn-signin" style="margin-top:8px;padding:14px">Sign In <i class="fas fa-arrow-right"></i></button>
          <!-- DEMO HINT REMOVED -->
        </div>
        <div id="auth-signup-form" style="display:none">
          <h2 class="auth-heading">Create Account</h2>
          <p class="auth-sub">Join URBANAXIS — it's free to get started</p>
          <div class="field"><i class="field-icon fas fa-user"></i><input type="text" id="su-name" placeholder="Full name" autocomplete="name"></div>
          <div class="field"><i class="field-icon fas fa-envelope"></i><input type="email" id="su-email" placeholder="Email address" autocomplete="email"></div>
          <div class="field"><i class="field-icon fas fa-phone"></i><input type="tel" id="su-phone" placeholder="Phone number" autocomplete="tel"></div>
          <div class="field"><i class="field-icon fas fa-lock"></i><input type="password" id="su-pass" placeholder="Password (min 6 chars)"></div>
          <div class="field"><i class="field-icon fas fa-check"></i><input type="password" id="su-confirm" placeholder="Confirm password"></div>
          <button class="btn btn-gold btn-full" id="btn-signup" style="margin-top:8px;padding:14px">Create Account <i class="fas fa-arrow-right"></i></button>
        </div>
      </div>
    </div>
  </div>`;
}

function bindAuth() {
  const signIn = document.getElementById('auth-signin-form');
  const signUp = document.getElementById('auth-signup-form');
  const tabSI = document.getElementById('tab-signin');
  const tabSU = document.getElementById('tab-signup');

  function setTab(isSignup) {
    signIn.style.display = isSignup ? 'none' : 'block';
    signUp.style.display = isSignup ? 'block' : 'none';
    tabSI.classList.toggle('active', !isSignup);
    tabSU.classList.toggle('active', isSignup);
  }

  tabSI?.addEventListener('click', () => setTab(false));
  tabSU?.addEventListener('click', () => setTab(true));

  document.getElementById('btn-signin')?.addEventListener('click', () => {
    const email = document.getElementById('li-email').value.trim();
    const pass = document.getElementById('li-pass').value;
    if (!email || !pass) { toast('Please fill in all fields.', 'error'); return; }
    try {
      const user = authenticate(email, pass);
      currentUser = user;
      localStorage.setItem('ua_session', JSON.stringify(user));
      sessionStorage.setItem('ua_session', JSON.stringify(user));
      toast(`Welcome back, ${user.name.split(' ')[0]}! 👋`);
      render(user.role === 'admin' ? 'dash' : 'dash');
    } catch(e) { toast(e.message, 'error'); }
  });

  document.getElementById('li-pass')?.addEventListener('keypress', e => { if(e.key==='Enter') document.getElementById('btn-signin')?.click(); });

  document.getElementById('btn-signup')?.addEventListener('click', () => {
    const name = document.getElementById('su-name').value.trim();
    const email = document.getElementById('su-email').value.trim();
    const phone = document.getElementById('su-phone').value.trim();
    const pass = document.getElementById('su-pass').value;
    const confirm = document.getElementById('su-confirm').value;
    if (!name || !email || !phone || !pass) { toast('All fields are required.', 'error'); return; }
    if (pass.length < 6) { toast('Password must be at least 6 characters.', 'error'); return; }
    if (pass !== confirm) { toast('Passwords do not match.', 'error'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Please enter a valid email.', 'error'); return; }
    try {
      createUser(name, email, phone, pass);
      toast('Account created! Please sign in.');
      document.getElementById('li-email').value = email;
      setTab(false);
    } catch(e) { toast(e.message, 'error'); }
  });
}


// ═══════════════════════════════════════════════════
//  ADMIN DASHBOARD
// ═══════════════════════════════════════════════════

  const tasks = getTasks();
  const products = getProducts();

  <div class="hero-banner">
    <div class="hero-content">
      <div class="hero-tag">Admin Control Center</div>
      <h1 class="hero-heading">Welcome back,<br>${esc(currentUser.name.split(' ')[0])} 👋</h1>
      <p class="hero-sub">Manage your clients, monitor progress and grow the business.</p>
    </div>
  </div>

  <div class="section-hd">
    <div class="section-title"><i class="fas fa-users" style="color:var(--gold)"></i> Client Management</div>
    <button class="btn btn-outline btn-sm" id="btn-assign-task-quick"><i class="fas fa-plus"></i> Assign Task</button>
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
    ${clients.length === 0 ? `<div class="card card-body" style="text-align:center;color:var(--text2)">No clients yet. Share the platform link to onboard clients.</div>` : clients.map(u => {
      const unread = unreadCount(currentUser.email, u.email);
      const uTasks = userTasks(u.email);
      return `
      <div class="user-card">
        <div style="display:flex;align-items:flex-start;gap:12px;justify-content:space-between">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="user-avatar">${u.avatar||'👤'}</div>
            <div>
              <div style="font-weight:700;font-size:0.97rem">${esc(u.name)}</div>
              <div style="color:var(--text2);font-size:0.8rem">${esc(u.email)}</div>
              <div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap">
                <span class="badge ${stageColor(u.stage)}">${u.stage||'new'}</span>
                ${unread>0?`<span class="badge badge-red"><i class="fas fa-envelope"></i> ${unread}</span>`:''}
              </div>
            </div>
          </div>
          <div style="display:flex;gap:6px">

        ${partners.length===0 ? `<div style="padding:16px;color:var(--text2);font-size:0.85rem">No contacts found.</div>` :
          partners.map(p => {

            return `

                <div class="chat-item-last">${lastMsg ? esc(lastMsg.text.substring(0,28))+'…' : 'No messages yet'}</div>
              </div>
              ${unread>0 ? `<span class="chat-unread">${unread}</span>` : ''}
            </div>`;
          }).join('')}
      </div>
    </div>
    <div class="chat-main">
      <div class="chat-main-header">
        ${partnerUser ? `
        <div style="display:flex;align-items:center;gap:10px">
          <div class="chat-item-avatar" style="width:36px;height:36px">${partnerUser.avatar||'👤'}</div>
          <div>
            <div style="font-weight:700">${esc(partnerUser.name)}</div>
            <div style="font-size:0.75rem;color:var(--text2)">${esc(partnerUser.email)}</div>
          </div>
        </div>` : `<div style="color:var(--text2)">Select a contact</div>`}
        <div style="display:flex;align-items:center;gap:6px"><div class="live-dot"></div><span style="font-size:0.75rem;color:var(--success)">Live</span></div>
      </div>
      <div class="chat-messages" id="chat-messages">
        ${msgs.length===0 && activeChatEmail ? `<div style="text-align:center;color:var(--text2);font-size:0.85rem;margin:auto">Start the conversation below 👇</div>` : ''}
        ${msgs.map(m => {
          const isMe = m.from===currentUser.email;
          return `
          <div class="msg-row ${isMe?'me':''}">
            <div class="msg-bubble ${isMe?'me':'other'}">
              ${esc(m.text).replace(/\n/g,'<br>')}
              <div class="msg-time">${tsLabel(m.ts)}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="chat-input-bar">
        <input type="text" id="chat-input" placeholder="Type your message…" ${!activeChatEmail?'disabled':''} autocomplete="off">
        <button class="btn btn-gold" id="btn-send-chat" ${!activeChatEmail?'disabled':''}><i class="fas fa-paper-plane"></i> Send</button>
      </div>
    </div>
  </div>`;
}

function bindChat() {
  if (!currentUser) return;

  // Scroll to bottom
  const msgsEl = document.getElementById('chat-messages');
  if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;

  document.querySelectorAll('[data-partner]').forEach(el => {
    el.addEventListener('click', () => {
      activeChatEmail = el.dataset.partner;
      markRead(currentUser.email, activeChatEmail);
      render('chat');
    });
  });

  document.getElementById('tab-chat-admin')?.addEventListener('click', () => { chatTabType='admin'; activeChatEmail=getAdmins()[0]?.email||null; render('chat'); });
  document.getElementById('tab-chat-users')?.addEventListener('click', () => { chatTabType='users'; activeChatEmail=getClients().find(u=>u.email!==currentUser.email)?.email||null; render('chat'); });

  function doSend() {
    const inp = document.getElementById('chat-input');
    if (!inp?.value.trim() || !activeChatEmail) return;
    sendMsg(currentUser.email, activeChatEmail, inp.value);
    inp.value = '';
    render('chat');
  }

  document.getElementById('btn-send-chat')?.addEventListener('click', doSend);
  document.getElementById('chat-input')?.addEventListener('keypress', e => { if(e.key==='Enter') doSend(); });

  // Auto-poll every 2s
  chatPollTimer = setInterval(() => {
    if (activeView !== 'chat') { clearInterval(chatPollTimer); return; }
    const msgs = activeChatEmail ? getConversation(currentUser.email, activeChatEmail) : [];
    const el = document.getElementById('chat-messages');
    if (!el) return;
    const isAtBottom = el.scrollHeight - el.clientHeight - el.scrollTop < 60;
    const newHtml = msgs.length===0 ? `<div style="text-align:center;color:var(--text2);font-size:0.85rem;margin:auto">Start the conversation below 👇</div>` :
      msgs.map(m => {
        const isMe = m.from===currentUser.email;
        return `<div class="msg-row ${isMe?'me':''}"><div class="msg-bubble ${isMe?'me':'other'}">${esc(m.text).replace(/\n/g,'<br>')}<div class="msg-time">${tsLabel(m.ts)}</div></div></div>`;
      }).join('');
    el.innerHTML = newHtml;
    if (isAtBottom) el.scrollTop = el.scrollHeight;
    if (activeChatEmail) markRead(currentUser.email, activeChatEmail);
  }, 2000);
}

        <div style="display:grid;gap:12px">
          <div class="field field-no-icon"><label class="field-label">Full Name</label><input type="text" id="p-name" value="${esc(u.name)}" style="padding-left:16px"></div>
          <div class="field field-no-icon"><label class="field-label">Phone</label><input type="text" id="p-phone" value="${esc(u.phone||'')}" placeholder="Phone number" style="padding-left:16px"></div>
          <div class="field field-no-icon"><label class="field-label">Location</label><input type="text" id="p-location" value="${esc(u.location||'')}" placeholder="City, Country" style="padding-left:16px"></div>
        </div>
        <div class="divider"></div>
        <div class="field field-no-icon"><label class="field-label">New Password (leave blank to keep current)</label><input type="password" id="p-newpass" placeholder="New password" style="padding-left:16px"></div>
        <div class="field field-no-icon" style="margin-top:10px"><label class="field-label">Confirm New Password</label><input type="password" id="p-confirmpass" placeholder="Confirm new password" style="padding-left:16px"></div>
        <button class="btn btn-gold btn-full" id="btn-save-profile" style="margin-top:16px;padding:13px"><i class="fas fa-save"></i> Save Changes</button>
      </div>
    </div>
    <div style="margin-top:16px;text-align:center;font-size:0.82rem;color:var(--text2)">
      Member since ${new Date(u.createdAt||Date.now()).toLocaleDateString()}
    </div>
  </div>`;
}

function bindProfile() {
  document.getElementById('btn-save-profile')?.addEventListener('click', () => {
    const name = document.getElementById('p-name').value.trim();
    const phone = document.getElementById('p-phone').value.trim();
    const location = document.getElementById('p-location').value.trim();
    const newpass = document.getElementById('p-newpass').value;
    const confirmpass = document.getElementById('p-confirmpass').value;

    if (!name) { toast('Name cannot be empty.', 'error'); return; }
    if (newpass && newpass.length < 6) { toast('Password must be at least 6 characters.', 'error'); return; }
    if (newpass && newpass !== confirmpass) { toast('Passwords do not match.', 'error'); return; }

    const updates = { name, phone, location };
    if (newpass) updates.password = btoa(newpass);
    updateUser(currentUser.email, updates);
    Object.assign(currentUser, updates);
    localStorage.setItem('ua_session', JSON.stringify(currentUser));
    sessionStorage.setItem('ua_session', JSON.stringify(currentUser));
    toast('Profile updated!');
    render('profile');
  });
}


// ═══════════════════════════════════════════════════
//  ASSIGN TASK MODAL
// ═══════════════════════════════════════════════════

function openAssignTaskModal(presetEmail) {
  const clients = getClients();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
  <div class="modal-box">
    <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:20px"><i class="fas fa-clipboard-list" style="color:var(--gold)"></i> Assign Task</h3>
    <div class="field field-no-icon">
      <label class="field-label">Assign To</label>
      <select id="modal-user" style="padding-left:16px;width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);padding:12px 16px;font-family:'Outfit',sans-serif;outline:none">
        ${clients.map(u => `<option value="${u.email}" ${u.email===presetEmail?'selected':''}>${esc(u.name)} (${esc(u.email)})</option>`).join('')}
      </select>
    </div>
    <div class="field field-no-icon">
      <label class="field-label">Task Title</label>
      <input type="text" id="modal-title" placeholder="e.g. Update business profile" style="padding-left:16px">
    </div>
    <div class="field field-no-icon">
      <label class="field-label">Due Date (optional)</label>
      <input type="date" id="modal-due" style="padding-left:16px">
    </div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn btn-gold" id="modal-confirm" style="flex:1;justify-content:center">Assign Task</button>
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
  document.getElementById('modal-cancel').addEventListener('click', () => overlay.remove());
  document.getElementById('modal-confirm').addEventListener('click', () => {
    const email = document.getElementById('modal-user').value;
    const title = document.getElementById('modal-title').value.trim();
    const due = document.getElementById('modal-due').value;
    if (!email || !title) { toast('Please select a user and enter a task title.', 'error'); return; }
    createTask(email, title, due);
    overlay.remove();
    toast('Task assigned!');
    render(activeView==='tasks'?'tasks':'dash');
  });
}


// ═══════════════════════════════════════════════════
//  GLOBAL EVENT BINDING
// ═══════════════════════════════════════════════════

function bindGlobal() {
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => render(btn.dataset.nav));
  });
  document.getElementById('btn-logout')?.addEventListener('click', () => {
    currentUser = null;
    localStorage.removeItem('ua_session');
    sessionStorage.removeItem('ua_session');
    activeChatEmail = null;
    toast('Signed out. See you soon!');
    render('login');
  });
}


// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════

DB.init();

// Restore session from localStorage (persistent) or sessionStorage
const stored = localStorage.getItem('ua_session') || sessionStorage.getItem('ua_session');
if (stored) {
  try {
    currentUser = JSON.parse(stored);
    render('dash');
  } catch { render('login'); }
} else {
  render('login');
}
</script>
</body>
</html>
